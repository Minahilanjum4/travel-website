<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JADOO Adventures — Colorful Template</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <style>
        /* ======================================================
                    COLORED TEMPLATE — COMPLETE STYLE GUIDE
                    ======================================================
                    COLOR PALETTE:
                    - Primary: #e67e22 (Warm Orange)
                    - Secondary: #2980b9 (Ocean Blue)
                    - Accent: #e74c3c (Vibrant Red)
                    - Gold: #f39c12 (Golden Yellow)
                    - Light: #fdf6ec (Cream)
                    - Dark: #1a2a3a (Deep Navy)
                    - Success: #27ae60 (Forest Green)
                    - Purple: #8e44ad (Royal Purple)
                    ====================================================== */
        
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #fdf6ec;
            color: #1a2a3a;
            line-height: 1.7;
            transition: background 0.4s, color 0.4s;
        }
        a { text-decoration: none; color: inherit; }
        img { max-width: 100%; display: block; border-radius: 12px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        /* ===== BUTTONS — COLORED ===== */
        .btn-primary {
            display: inline-block;
            background: linear-gradient(135deg, #e67e22, #f39c12);
            color: #fff;
            padding: 16px 44px;
            border-radius: 50px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 20px rgba(230, 126, 34, 0.35);
        }
        .btn-primary:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 12px 40px rgba(230, 126, 34, 0.5);
        }
        
        .btn-secondary {
            display: inline-block;
            background: linear-gradient(135deg, #2980b9, #3498db);
            color: #fff;
            padding: 16px 44px;
            border-radius: 50px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 20px rgba(41, 128, 185, 0.35);
        }
        .btn-secondary:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 12px 40px rgba(41, 128, 185, 0.5);
        }
        
        .btn-accent {
            display: inline-block;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            padding: 16px 44px;
            border-radius: 50px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 20px rgba(231, 76, 60, 0.35);
        }
        .btn-accent:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 12px 40px rgba(231, 76, 60, 0.5);
        }
        
        .btn-success {
            display: inline-block;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
            padding: 16px 44px;
            border-radius: 50px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 20px rgba(39, 174, 96, 0.35);
        }
        .btn-success:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 12px 40px rgba(39, 174, 96, 0.5);
        }
        
        .btn-purple {
            display: inline-block;
            background: linear-gradient(135deg, #8e44ad, #9b59b6);
            color: #fff;
            padding: 16px 44px;
            border-radius: 50px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 20px rgba(142, 68, 173, 0.35);
        }
        .btn-purple:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 12px 40px rgba(142, 68, 173, 0.5);
        }
        
        /* ======================================================
                    SECTION COLOR VARIATIONS
                    ====================================================== */
        
        /* ===== HEADER — COLORED ===== */
        header {
            background: linear-gradient(135deg, #1a2a3a, #2c3e50);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            padding: 12px 0;
            transition: all 0.4s ease;
            border-bottom: 3px solid #e67e22;
        }
        header.scrolled {
            padding: 8px 0;
            background: linear-gradient(135deg, #0d1b2a, #1a2a3a);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: #e67e22;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo i { color: #f39c12; }
        .logo span { color: #fff; font-weight: 700; }
        .nav-links {
            display: flex;
            gap: 25px;
            list-style: none;
            font-weight: 600;
            align-items: center;
        }
        .nav-links a {
            color: #ecf0f1;
            transition: color 0.3s;
            font-size: 0.9rem;
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 3px;
            background: #e67e22;
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        .nav-links a:hover::after { width: 100%; }
        .nav-links a:hover { color: #e67e22; }
        .hamburger {
            display: none;
            font-size: 1.6rem;
            cursor: pointer;
            background: none;
            border: none;
            color: #fff;
        }
        .dark-toggle {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #ecf0f1;
            padding: 0 5px;
        }
        .dark-toggle:hover { color: #f39c12; }
        
        /* ======================================================
                    HERO — GRADIENT BACKGROUND
                    ====================================================== */
        .hero {
            position: relative;
            color: #fff;
            padding: 160px 0 120px;
            text-align: center;
            overflow: hidden;
            min-height: 700px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a2a3a, #2c3e50, #e67e22);
            background-size: 400% 400%;
            animation: gradientMove 10s ease-in-out infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.3;
        }
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 27, 42, 0.6);
            z-index: 1;
        }
        .hero .container {
            position: relative;
            z-index: 2;
        }
        .hero .adventure-badge {
            display: inline-block;
            background: linear-gradient(135deg, #e67e22, #f39c12);
            color: #fff;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .hero h1 {
            font-size: 4.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        .hero h1 span {
            background: linear-gradient(135deg, #e67e22, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero .subtitle {
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: 15px;
            opacity: 0.9;
        }
        .hero .subtitle i { color: #e67e22; }
        
        /* ======================================================
                    ABOUT — COLORED
                    ====================================================== */
        .about {
            padding: 80px 0;
            background: linear-gradient(135deg, #fdf6ec, #f5e6d3);
        }
        .about .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }
        .about-text .adventure-quote {
            font-size: 1.2rem;
            font-weight: 600;
            color: #e67e22;
            border-left: 4px solid #e67e22;
            padding-left: 20px;
            font-style: italic;
        }
        .about-image img {
            width: 100%;
            height: 380px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            transition: transform 0.5s ease;
            border: 5px solid #e67e22;
        }
        .about-image img:hover { transform: scale(1.02); }
        
        /* ======================================================
                    COUNTERS — GRADIENT
                    ====================================================== */
        .counters {
            padding: 60px 0;
            background: linear-gradient(135deg, #1a2a3a, #2c3e50, #2980b9);
            color: #fff;
            border-top: 4px solid #e67e22;
            border-bottom: 4px solid #e67e22;
        }
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            text-align: center;
        }
        .counter-item .counter-number {
            font-size: 3.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #e67e22, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .counter-item .counter-label {
            font-size: 1rem;
            opacity: 0.85;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #f39c12;
        }
        
        /* ======================================================
                    PROMOS — COLORED CARDS
                    ====================================================== */
        .promos {
            padding: 80px 0;
            background: linear-gradient(135deg, #ecf0f1, #fdf6ec);
        }
        .promo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .promo-card {
            border-radius: 20px;
            padding: 30px 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #fff;
        }
        .promo-card:nth-child(1) {
            background: linear-gradient(135deg, #e67e22, #f39c12);
        }
        .promo-card:nth-child(2) {
            background: linear-gradient(135deg, #2980b9, #3498db);
        }
        .promo-card:nth-child(3) {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }
        .promo-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        .promo-card .promo-icon { font-size: 3rem; margin-bottom: 10px; }
        .promo-card h3 { font-size: 1.6rem; margin-bottom: 5px; }
        .promo-card .price {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            margin: 10px 0 15px;
        }
        .promo-card .price small {
            font-size: 0.9rem;
            font-weight: 400;
            opacity: 0.8;
        }
        .promo-card ul {
            list-style: none;
            text-align: left;
            padding: 0;
            margin: 15px 0 20px;
        }
        .promo-card ul li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            font-size: 0.95rem;
        }
        .promo-card ul li::before {
            content: '🏔️ ';
            font-weight: 700;
        }
        .promo-badge {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 16px;
            border-radius: 50px;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .promo-card .btn {
            background: rgba(255,255,255,0.2);
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .promo-card .btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }
        
        /* ===== COUNTDOWN ===== */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 12px 0 15px;
        }
        .countdown .cd-item {
            background: rgba(0,0,0,0.2);
            padding: 8px 14px;
            border-radius: 10px;
            min-width: 50px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .countdown .cd-item .cd-number {
            font-size: 1.4rem;
            font-weight: 800;
            display: block;
        }
        .countdown .cd-item .cd-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            opacity: 0.8;
        }
        .promo-tag {
            display: inline-block;
            background: #e74c3c;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 14px;
            border-radius: 50px;
            text-transform: uppercase;
            animation: pulseAdventure 1.5s ease-in-out infinite;
            margin-left: 8px;
        }
        @keyframes pulseAdventure {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        
        /* ======================================================
                    SERVICES — COLORED CARDS
                    ====================================================== */
        .services {
            padding: 80px 0;
            background: linear-gradient(135deg, #fdf6ec, #ecf0f1);
        }
        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .service-card {
            padding: 35px 25px;
            border-radius: 16px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #fff;
            position: relative;
        }
        .service-card:nth-child(1) { background: linear-gradient(135deg, #e67e22, #f39c12); }
        .service-card:nth-child(2) { background: linear-gradient(135deg, #2980b9, #3498db); }
        .service-card:nth-child(3) { background: linear-gradient(135deg, #8e44ad, #9b59b6); }
        .service-card:nth-child(4) { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }
        .service-card .icon-wrapper {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .service-card i { font-size: 2.5rem; }
        .service-card h4 { font-size: 1.2rem; margin-bottom: 8px; }
        .service-card p { font-size: 0.95rem; opacity: 0.9; }
        
        /* ======================================================
                    TESTIMONIALS
                    ====================================================== */
        .testimonials {
            padding: 80px 0;
            background: linear-gradient(135deg, #ecf0f1, #fdf6ec);
        }
        .testimonial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .testimonial-card {
            background: #fff;
            padding: 30px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.4s ease;
            position: relative;
            border-left: 5px solid #e67e22;
        }
        .testimonial-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
            border-left-color: #2980b9;
        }
        .testimonial-card .stars { color: #f39c12; font-size: 1.2rem; letter-spacing: 3px; margin-bottom: 8px; }
        .testimonial-card p { font-style: italic; color: #2c3e50; font-size: 0.98rem; }
        .testimonial-card .name { font-weight: 700; margin-top: 12px; color: #1a2a3a; }
        .testimonial-card .name span { color: #e67e22; font-weight: 400; font-size: 0.85rem; }
        
        /* ======================================================
                    GALLERY
                    ====================================================== */
        .gallery {
            padding: 80px 0;
            background: linear-gradient(135deg, #fdf6ec, #ecf0f1);
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .gallery-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid #e67e22;
            transition: border-color 0.3s ease;
        }
        .gallery-item:hover { border-color: #2980b9; }
        .gallery-item img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            transition: all 0.6s ease;
        }
        .gallery-item:hover img { transform: scale(1.1); }
        .gallery-item .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 20px 20px;
            background: linear-gradient(transparent, rgba(13, 27, 42, 0.85));
            color: #fff;
            transform: translateY(100%);
            transition: transform 0.4s ease;
        }
        .gallery-item:hover .gallery-overlay { transform: translateY(0); }
        .gallery-overlay h4 { font-size: 1.2rem; font-weight: 700; }
        .gallery-overlay h4 i { color: #e67e22; margin-right: 6px; }
        .gallery-overlay p { font-size: 0.85rem; opacity: 0.85; }
        
        /* ======================================================
                    BOOKING
                    ====================================================== */
        .booking {
            padding: 80px 0;
            background: linear-gradient(135deg, #ecf0f1, #fdf6ec);
        }
        .booking-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: start;
        }
        .booking-form {
            background: #fff;
            padding: 40px 45px;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
            border: 2px solid #e67e22;
        }
        .booking-form .form-group { margin-bottom: 18px; }
        .booking-form label {
            font-weight: 700;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 5px;
            color: #1a2a3a;
        }
        .booking-form label i { color: #e67e22; margin-right: 6px; }
        .booking-form input,
        .booking-form textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #fdf6ec;
        }
        .booking-form input:focus,
        .booking-form textarea:focus {
            border-color: #e67e22;
            outline: 3px solid rgba(230, 126, 34, 0.2);
            background: #fff;
        }
        .booking-form textarea { resize: vertical; min-height: 100px; }
        .booking-form .btn-primary { width: 100%; padding: 16px; font-size: 1.05rem; }
        .booking-info h3 { font-size: 1.8rem; margin-bottom: 15px; font-weight: 900; }
        .booking-info h3 span { color: #e67e22; }
        .booking-info ul { list-style: none; padding: 0; }
        .booking-info ul li {
            padding: 10px 0;
            border-bottom: 1px solid #ecf0f1;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }
        .booking-info ul li i { color: #e67e22; font-size: 1.2rem; width: 30px; }
        #formFeedback {
            text-align: center;
            margin-top: 15px;
            font-weight: 600;
            color: #27ae60;
            display: none;
        }
        
        /* ======================================================
                    TRUST BADGES
                    ====================================================== */
        .trust-badges {
            padding: 40px 0;
            background: linear-gradient(135deg, #1a2a3a, #2c3e50);
            text-align: center;
            border-top: 4px solid #e67e22;
            border-bottom: 4px solid #e67e22;
        }
        .trust-badges .badge-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
        }
        .trust-badges .badge-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 600;
            color: #ecf0f1;
        }
        .trust-badges .badge-item i { font-size: 2.2rem; color: #e67e22; }
        
        /* ======================================================
                    FOOTER
                    ====================================================== */
        .contact {
            padding: 80px 0 40px;
            background: linear-gradient(135deg, #0d1b2a, #1a2a3a);
            color: #b0a490;
            border-top: 4px solid #e67e22;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }
        .contact-grid h4 {
            color: #f39c12;
            font-size: 1.15rem;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .contact-grid p,
        .contact-grid li {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #b0a490;
        }
        .contact-grid ul { list-style: none; padding: 0; }
        .contact-grid ul li { padding: 3px 0; }
        .contact-grid ul li a:hover { color: #e67e22; }
        .contact-grid i { width: 24px; color: #e67e22; }
